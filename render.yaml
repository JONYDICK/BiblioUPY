databases:
  - name: biblioupy-db
    plan: free
    databaseName: biblioupy
    user: biblioupy_user

services:
  - type: web
    name: biblioupy
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && cd frontend && npm install --include=dev && cd .. && npm run build && cd backend && npx drizzle-kit push && cd ..
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biblioupy-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        value: biblioupy-files
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
